baseURL = "https://vetsin.inxpire.tw/"
title = "啊否的好好味啊"
theme = "blowfish"

# 1. 核心參數：這兩行必須在最前面
defaultContentLanguage = "zh-tw"
languageCode = "zh-tw"
hasCJKLanguage = true

# 2. 強制接管語言定義（不使用 disableLanguages，避免報錯）
[languages]
  [languages.zh-tw]
    languageName = "繁體中文"
    languageCode = "zh-tw"
    contentDir = "content"
    weight = 1

# 3. 核心參數區塊
[params]
  env = "production"
  mainSections = ["posts"]

[params.homepage]
  layout = "background" 
  showRecent = true
  showRecentItems = 5

[params.header]
  layout = "fixed"

[markup.goldmark.renderer]
  unsafe = true